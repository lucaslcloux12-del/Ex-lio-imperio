<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de Exílios do Império</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #161f30;
            --accent-color: #ef4444;
            --accent-muted: rgba(239, 68, 68, 0.2);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #243249;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative; /* Necessário para posicionar o botão absoluto na janela */
        }

        header {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 25px;
            max-width: 700px;
            width: 100%;
        }

        h1 {
            font-size: 1.8rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-container {
            max-width: 700px;
            width: 100%;
        }

        /* Botão Secreto no Canto Superior Direito */
        .admin-trigger-zone {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 999;
        }

        .btn-toggle-admin {
            background: transparent;
            border: none;
            color: #1a2333; /* Cor bem escura para camuflar no fundo */
            font-size: 1.1rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 5px;
            transition: color 0.3s, background-color 0.3s;
        }

        /* Revela sutilmente apenas quando passa o mouse por cima */
        .btn-toggle-admin:hover {
            color: var(--text-muted);
            background-color: rgba(255, 255, 255, 0.02);
        }

        /* Painel de Administração / Login */
        .admin-panel {
            display: none;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .admin-form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .admin-input {
            flex: 1;
            min-width: 150px;
            padding: 10px 12px;
            background: #0b0f19;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }

        .admin-input:focus {
            border-color: var(--accent-color);
        }

        .btn-action {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            transition: 0.2s;
        }

        .btn-login { background-color: #3b82f6; }
        .btn-login:hover { background-color: #2563eb; }
        .btn-add { background-color: var(--accent-color); }
        .btn-add:hover { background-color: #dc2626; }

        /* Buscador e Filtros */
        .search-box {
            width: 100%;
            padding: 12px 15px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
            margin-bottom: 20px;
            outline: none;
        }

        .search-box:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.2);
        }

        /* Cards de Exilados */
        .exile-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .exile-card.revogado {
            border-left-color: var(--success-color);
            opacity: 0.75;
        }

        .exile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-right: 80px;
        }

        .exile-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge.ativo { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.4); }
        .badge.revogado { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.4); }

        .exile-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .exile-reason {
            font-size: 0.95rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 6px;
            line-height: 1.4;
            color: #e5e7eb;
        }

        /* Controles Inline do Administrador */
        .card-admin-controls {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            gap: 8px;
        }

        .btn-inline {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
        }

        .btn-inline-forgive { background-color: var(--success-color); }
        .btn-inline-delete { background-color: #374151; }

        .counter-info {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-message {
            text-align: center;
            color: var(--text-muted);
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <!-- Botão Oculto de Ajustes no topo direito extremo -->
    <div class="admin-trigger-zone">
        <button class="btn-toggle-admin" id="btn-toggle-view" onclick="toggleAdminPanel()">⚙️</button>
    </div>

    <header>
        <h1>Mural de Exílios do Império</h1>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">Lista pública de decretos oficiais de banimento e restrição</p>
    </header>

    <div class="main-container">

        <!-- Painel Admin Secreto (Apenas abre ao clicar na engrenagem) -->
        <div class="admin-panel" id="admin-panel">
            <!-- Tela 1: Formulário de Autenticação -->
            <div id="admin-login-box">
                <p style="margin-bottom: 12px; font-size: 0.9rem; color: #f87171;">⚠️ Identificação Imperial Necessária.</p>
                <div class="admin-form-group">
                    <input type="email" class="admin-input" id="auth-email" placeholder="E-mail do Administrador">
                    <input type="password" class="admin-input" id="auth-password" placeholder="Senha secreta">
                    <button class="btn-action btn-login" onclick="realizarLogin()">Entrar</button>
                </div>
            </div>

            <!-- Tela 2: Adicionar Novo Exilado (Pós Login) -->
            <div id="admin-tools-box" style="display: none;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center;">
                    <h3 style="color: #fff; font-size: 1.1rem;">Decretar Novo Exílio</h3>
                    <button class="btn-inline btn-inline-delete" onclick="realizarLogout()">Fechar Modificações</button>
                </div>
                <div class="admin-form-group">
                    <input type="text" class="admin-input" id="exile-nome" placeholder="Nome / Apelido do Alvo" style="flex: 2;">
                    <input type="text" class="admin-input" id="exile-autor" placeholder="Decretado por" value="LucasCloux" style="flex: 1;">
                </div>
                <div class="admin-form-group" style="margin-bottom: 0;">
                    <input type="text" class="admin-input" id="exile-motivo" placeholder="Motivo detalhado do exílio..." style="flex: 3;">
                    <button class="btn-action btn-add" onclick="adicionarExilio()">Aplicar Decreto</button>
                </div>
            </div>
        </div>

        <!-- Filtro público -->
        <input type="text" class="search-box" id="search-input" placeholder="Filtrar exilados por codinome ou justificativa..." oninput="filtrarResultados()">

        <!-- Estatísticas públicas -->
        <div id="counter-geral" class="counter-info">Acessando arquivos imperiais...</div>

        <!-- Lista -->
        <div id="container-exilados"></div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfG1gFI4SoEdttmhwORZt92_9bgqJcsgw",
            authDomain: "call-9cc3b.firebaseapp.com",
            databaseURL: "https://call-9cc3b-default-rtdb.firebaseio.com",
            projectId: "call-9cc3b",
            storageBucket: "call-9cc3b.firebasestorage.app",
            messagingSenderId: "919168566449",
            appId: "1:919168566449:web:b57c4c4020bf3cace30e90",
            measurementId: "G-GYBCF1LG64"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let listaExilados = [];
        let isAdminAutenticado = false;

        window.toggleAdminPanel = function() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        window.realizarLogin = function() {
            const email = document.getElementById('auth-email').value.trim();
            const senha = document.getElementById('auth-password').value.trim();

            if (email === "lucaslcloux12@gmail.com" && senha === "lu012012") {
                isAdminAutenticado = true;
                document.getElementById('admin-login-box').style.display = 'none';
                document.getElementById('admin-tools-box').style.display = 'block';
                
                document.querySelectorAll('.card-admin-controls').forEach(el => el.style.display = 'flex');
                alert("Modo de edição habilitado com sucesso.");
            } else {
                alert("Código de acesso incorreto.");
            }
        }

        window.realizarLogout = function() {
            isAdminAutenticado = false;
            document.getElementById('auth-email').value = "";
            document.getElementById('auth-password').value = "";
            document.getElementById('admin-tools-box').style.display = 'none';
            document.getElementById('admin-login-box').style.display = 'block';
            document.getElementById('admin-panel').style.display = 'none';
            
            document.querySelectorAll('.card-admin-controls').forEach(el => el.style.display = 'none');
        }

        window.adicionarExilio = function() {
            if (!isAdminAutenticado) return;

            const nome = document.getElementById('exile-nome').value.trim();
            const autor = document.getElementById('exile-autor').value.trim() || "LucasCloux";
            const motivo = document.getElementById('exile-motivo').value.trim();

            if (!nome || !motivo) {
                alert("Por favor, preencha o Nome e a Justificativa.");
                return;
            }

            const dataAtual = new Date();
            const dataFormatada = `${String(dataAtual.getDate()).padStart(2, '0')}/${String(dataAtual.getMonth() + 1).padStart(2, '0')}/${dataAtual.getFullYear()}`;

            const exiliosRef = ref(db, 'exilios');
            push(exiliosRef, {
                nome: nome,
                motivo: motivo,
                dataExilio: dataFormatada,
                status: 'ativo',
                decretadoPor: autor
            }).then(() => {
                document.getElementById('exile-nome').value = "";
                document.getElementById('exile-motivo').value = "";
                alert("Decreto executado!");
            });
        }

        window.perdoarExilado = function(id, statusAtual) {
            if (!isAdminAutenticado) return;
            const novoStatus = statusAtual === 'ativo' ? 'revogado' : 'ativo';
            update(ref(db, `exilios/${id}`), { status: novoStatus });
        }

        window.deletarExilado = function(id) {
            if (!isAdminAutenticado) return;
            if (confirm("Deletar permanentemente este registro da história?")) {
                remove(ref(db, `exilios/${id}`));
            }
        }

        function carregarDados() {
            const exiliosRef = ref(db, 'exilios');
            onValue(exiliosRef, (snapshot) => {
                const dados = snapshot.val() || {};
                listaExilados = [];

                for (let id in dados) {
                    listaExilados.push({
                        id: id,
                        nome: dados[id].nome || "Desconhecido",
                        motivo: dados[id].motivo || "Nenhum histórico.",
                        dataExilio: dados[id].dataExilio || "--/--/----",
                        status: dados[id].status || "ativo",
                        decretadoPor: dados[id].decretadoPor || "Império"
                    });
                }

                listaExilados.reverse();
                renderizarMural();
            });
        }

        window.filtrarResultados = function() {
            renderizarMural();
        }

        function renderizarMural() {
            const container = document.getElementById('container-exilados');
            const termoBusca = document.getElementById('search-input').value.toLowerCase().trim();
            
            container.innerHTML = '';
            let contadorAtivos = 0;

            listaExilados.forEach(item => {
                const corresponde = item.nome.toLowerCase().includes(termoBusca) || item.motivo.toLowerCase().includes(termoBusca);
                if (!corresponde) return;

                if (item.status === 'ativo') contadorAtivos++;

                let card = document.createElement('div');
                card.className = `exile-card ${item.status === 'revogado' ? 'revogado' : ''}`;
                
                const displayControl = isAdminAutenticado ? 'flex' : 'none';

                card.innerHTML = `
                    <div class="exile-header">
                        <span class="exile-name">${item.nome}</span>
                        <span class="badge ${item.status}">${item.status === 'ativo' ? '⚠️ Ativo' : '✅ Perdoado'}</span>
                    </div>
                    <div class="exile-meta">
                        <span>📅 <strong>Data:</strong> ${item.dataExilio}</span>
                        <span>🛡️ <strong>Autoridade:</strong> ${item.decretadoPor}</span>
                    </div>
                    <div class="exile-reason">
                        ${item.motivo}
                    </div>
                    <div class="card-admin-controls" style="display: ${displayControl};">
                        <button class="btn-inline btn-inline-forgive" onclick="perdoarExilado('${item.id}', '${item.status}')">
                            ${item.status === 'ativo' ? 'Perdoar' : 'Reativar'}
                        </button>
                        <button class="btn-inline btn-inline-delete" onclick="deletarExilado('${item.id}')">Excluir</button>
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('counter-geral').innerText = `O sistema registra atualmente ${contadorAtivos} exílio(s) ativo(s) de um total de ${listaExilados.length} listados.`;

            if (listaExilados.length === 0) {
                container.innerHTML = '<p class="empty-message">Nenhum registro localizado.</p>';
            }
        }

        carregarDados();
    </script>
</body>
</html>
